name: CI

on:
  # Fires only on push to main. workflow_dispatch stays so you can
  # manually re-run from the Actions tab without a commit.
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality gate ──────────────────────────────────────────────────────────
  # Lint + typecheck + format check. Fast, blocks the test matrix.
  quality:
    name: Lint + Typecheck + Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck

  # ── Test matrix — one run per browser ────────────────────────────────────
  test:
    name: Test (${{ matrix.browser }})
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Cache Playwright browser binaries by resolved Playwright version
      # so runners don't re-download ~300MB every job.
      - name: Resolve Playwright version
        id: pw
        run: |
          v=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}-${{ matrix.browser }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run BDD suite
        env:
          APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
        run: |
          npx bddgen
          npx playwright test --project=bdd:${{ matrix.browser }} --grep-invert @flaky

      - name: Run API suite (chromium only)
        if: matrix.browser == 'chromium'
        run: npm run test:api

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 14
