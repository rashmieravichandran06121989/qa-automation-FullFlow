# Observability stack for local k6 runs.
# Hardened against the common smells: pinned versions, healthchecks,
# resource caps, restart policies, isolated network, no anonymous admin.
#
# Bring up: docker compose up -d
# Tear down: docker compose down -v

name: k6-observability

services:
  influxdb:
    image: influxdb:1.8.10-alpine
    container_name: k6-influxdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086" # bind loopback — no external exposure
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
      INFLUXDB_ADMIN_USER: ${INFLUX_ADMIN_USER:-k6admin}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUX_ADMIN_PASSWORD:?must be set in .env}
      INFLUXDB_USER: ${INFLUX_USER:-k6writer}
      INFLUXDB_USER_PASSWORD: ${INFLUX_USER_PASSWORD:?must be set in .env}
    volumes:
      - influxdb-data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - obs

  grafana:
    image: grafana/grafana:11.1.3
    container_name: k6-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?must be set in .env}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    healthcheck:
      test:
        ["CMD-SHELL", 'wget -qO- http://localhost:3000/api/health | grep -q ''"database": "ok"''']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      influxdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - obs

volumes:
  influxdb-data:
  grafana-data:

networks:
  obs:
    driver: bridge
