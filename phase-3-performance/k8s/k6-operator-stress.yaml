# Distributed k6 via grafana-k6-operator.
#
# Closes the audit gap "no distributed mode — single-instance k6 caps ~1000
# req/s". For a real load test against an internal target, this manifest
# spreads the stress test across N parallel runner pods, each generating a
# share of the target rate.
#
# Prereqs (one-off, per cluster):
#
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm install k6-operator grafana/k6-operator \
#     --namespace k6 --create-namespace
#
# Run:
#
#   kubectl apply -f k8s/k6-operator-stress.yaml
#   kubectl logs -f -n k6 -l app=k6,test=stress-distributed
#
# How parallelism works:
#   - parallelism: 4 spawns 4 runner pods.
#   - k6-operator splits the test by VU range automatically; each pod
#     handles 1/4 of the configured VUs / arrival rate.
#   - Aggregate metrics stream to InfluxDB via the `args` below. Use the
#     existing `k6-overview` Grafana dashboard.

apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: stress-distributed
  namespace: k6
  labels:
    app: k6
    test: stress-distributed
spec:
  parallelism: 4
  separate: true   # distinct pods, not a single pod with N processes
  cleanup:    post  # delete runners after the test finishes
  script:
    configMap:
      name: stress-script
      file: stress-test.js   # built from tests/stress/stress-test.ts via esbuild
  arguments: >-
    --out influxdb=http://influxdb.observability.svc.cluster.local:8086/k6
    --tag run_id=$(uuidgen)
    --summary-export=/tmp/summary.json
  runner:
    image: grafana/k6:0.54.0
    resources:
      requests: { cpu: 500m,  memory: 256Mi }
      limits:   { cpu: 1000m, memory: 512Mi }
    env:
      - name:  K6_ENV
        value: staging
      - name:  STAGING_BASE_URL
        valueFrom:
          configMapKeyRef: { name: k6-env, key: STAGING_BASE_URL }
      - name:  K6_INFLUXDB_USERNAME
        valueFrom:
          secretKeyRef: { name: influx-creds, key: writer-user }
      - name:  K6_INFLUXDB_PASSWORD
        valueFrom:
          secretKeyRef: { name: influx-creds, key: writer-pass }
---
# The stress script lives as a ConfigMap. Build/transpile it from TS via:
#   npx esbuild tests/stress/stress-test.ts --bundle --target=es2020 \
#     --format=cjs --platform=neutral > stress-test.js
#   kubectl create configmap stress-script --from-file=stress-test.js -n k6 --dry-run=client -o yaml > script-cm.yaml
#
# Committed shape only — keep the actual built JS out of git; CI generates
# it during the deploy step.
apiVersion: v1
kind: ConfigMap
metadata:
  name: stress-script
  namespace: k6
data:
  stress-test.js: |
    // populated by CI; do not commit a built artefact here.
    console.log('placeholder — CI overwrites this ConfigMap before TestRun applies');
