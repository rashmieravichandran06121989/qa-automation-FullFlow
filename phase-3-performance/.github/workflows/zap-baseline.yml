name: ZAP Baseline Scan

# OWASP ZAP baseline scan — passive checks only (no active payloads).
# Designed to be safe to run against your own dev/staging targets, never prod
# without explicit authorisation.
#
# Two modes:
#   - workflow_call: invoked by master-pipeline.yml with a target URL input
#   - workflow_dispatch: manual one-off scan from the Actions tab
#
# Decoupled from the main quality gate because:
#   1. Baseline takes ~5–10 min — too slow for every PR
#   2. Target URL is environment-dependent (sandbox vs staging)
#   3. Findings reach Code Scanning via SARIF — separate signal, separate cadence

on:
  workflow_call:
    inputs:
      target_url:
        description: "URL to scan"
        required: true
        type: string
      gate_on_warnings:
        description: "Fail the workflow on WARN findings (false = report only)"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL to scan"
        required: true
        type: string
        default: "https://jsonplaceholder.typicode.com"
      gate_on_warnings:
        description: "Fail on WARN findings"
        required: true
        type: boolean
        default: false
  schedule:
    # Weekly Monday 02:00 UTC scan against sandbox — drift detection.
    - cron: "0 2 * * 1"

permissions:
  contents:        read
  issues:          write     # ZAP action opens an issue on findings
  security-events: write     # SARIF upload to Code Scanning

concurrency:
  group: zap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: ZAP Baseline · ${{ inputs.target_url || 'sandbox' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Resolve target URL
        id: target
        run: |
          # Default to jsonplaceholder for the schedule trigger
          URL="${{ inputs.target_url }}"
          URL="${URL:-https://jsonplaceholder.typicode.com}"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Scanning: ${URL}"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ steps.target.outputs.url }}
          # Rules file maps individual passive rules to PASS / IGNORE / WARN / FAIL.
          # Use this to suppress known-noisy findings (e.g. missing CSP on a public
          # JSON API where it does not apply) without disabling the whole rule.
          rules_file_name: ".zap/rules.tsv"
          # Custom command-line flags. -I = do not fail on warnings (report only).
          # The summary job below decides the workflow exit code based on
          # gate_on_warnings input.
          cmd_options: ${{ inputs.gate_on_warnings && '-a' || '-a -I' }}
          # Open a tracking issue per scan with the markdown summary.
          issue_title: "ZAP baseline – ${{ steps.target.outputs.url }}"
          allow_issue_writing: true
          # Token used by the action's issue/PR comment feature.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert ZAP report to SARIF
        if: always()
        run: |
          set -euo pipefail
          # The ZAP action writes report_html.html, report_md.md, report_json.json.
          # Convert the JSON to SARIF so findings appear in GitHub Code Scanning.
          if [ -f report_json.json ]; then
            npx --yes @microsoft/sarif-multitool convert report_json.json \
              -t ZapJson -o zap-results.sarif || true
          fi

      - name: Upload SARIF to Code Scanning
        if: always() && hashFiles('zap-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: zap-results.sarif
          category: zap-baseline

      - name: Upload raw report artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-${{ github.run_id }}
          path: |
            report_html.html
            report_md.md
            report_json.json
            zap-results.sarif
          retention-days: 30
          if-no-files-found: warn
