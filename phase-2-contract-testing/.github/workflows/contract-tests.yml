name: contract-tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

env:
  PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
  PACT_BROKER_TOKEN:    ${{ secrets.PACT_BROKER_TOKEN }}

jobs:
  consumer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consumer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: consumer/package-lock.json
      - run: npm ci
      - run: npm test
      - name: Upload pacts artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacts
          path: pacts/
          if-no-files-found: error
      - name: Publish pacts to broker
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.PACT_BROKER_BASE_URL != ''
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npm run publish:pacts

  provider:
    needs: consumer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: provider
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: provider/package-lock.json
      - name: Download pacts artifact
        uses: actions/download-artifact@v4
        with:
          name: pacts
          path: pacts/
      - run: npm ci
      - name: Verify against broker
        if: env.PACT_BROKER_BASE_URL != ''
        env:
          CI: 'true'
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npm test
      - name: Verify against local pact file
        if: env.PACT_BROKER_BASE_URL == ''
        run: npm run test:local

  can-i-deploy:
    needs: provider
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.PACT_BROKER_BASE_URL != ''
    runs-on: ubuntu-latest
    steps:
      - uses: pact-foundation/pact-cli-action@v1
      - name: can-i-deploy UserService → production
        run: |
          pact-broker can-i-deploy \
            --pacticipant UserService \
            --version "${{ github.sha }}" \
            --to-environment production \
            --retry-while-unknown 6 \
            --retry-interval 10
      - name: Record deployment
        run: |
          pact-broker record-deployment \
            --pacticipant UserService \
            --version "${{ github.sha }}" \
            --environment production
