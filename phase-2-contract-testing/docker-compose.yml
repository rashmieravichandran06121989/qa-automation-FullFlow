version: '3.9'

# ---------------------------------------------------------------------------
# Local Pact Broker stack
#
# Usage:
#   docker compose up -d          # start broker + postgres
#   docker compose down -v        # stop and wipe volumes
#
# Broker UI:  http://localhost:9292
# ---------------------------------------------------------------------------

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pact
      POSTGRES_PASSWORD: pact
      POSTGRES_DB: pact
    volumes:
      - pact_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pact"]
      interval: 10s
      timeout: 5s
      retries: 5

  pact-broker:
    image: pactfoundation/pact-broker:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9292:9292"
    environment:
      PACT_BROKER_DATABASE_ADAPTER: postgres
      PACT_BROKER_DATABASE_HOST: postgres
      PACT_BROKER_DATABASE_PORT: 5432
      PACT_BROKER_DATABASE_NAME: pact
      PACT_BROKER_DATABASE_USERNAME: pact
      PACT_BROKER_DATABASE_PASSWORD: pact
      # Basic auth for the UI — change before exposing externally
      PACT_BROKER_BASIC_AUTH_USERNAME: admin
      PACT_BROKER_BASIC_AUTH_PASSWORD: admin
      PACT_BROKER_ALLOW_PUBLIC_READ: 'true'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9292/diagnostic/status/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pact_postgres_data:
