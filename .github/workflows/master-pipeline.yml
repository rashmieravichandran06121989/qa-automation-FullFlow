name: Master Quality Gate

# Plan-aligned orchestrator (45-day plan, Days 35-42).
# Stages mirror what runs locally; no scope creep.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: master-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents:        read
  security-events: write

env:
  NODE_VERSION: "20"
  K6_VERSION:   "0.54.0"

jobs:
  # ---------------- Quality: lint + typecheck per phase ---------------------
  quality:
    name: Quality / ${{ matrix.phase.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        phase:
          - { name: phase-1,          dir: phase-1-ai-testing }
          - { name: phase-2-consumer, dir: phase-2-contract-testing/consumer }
          - { name: phase-2-provider, dir: phase-2-contract-testing/provider }
          - { name: phase-3,          dir: phase-3-performance }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.phase.dir }}/package-lock.json
      - run: npm ci --no-audit --no-fund
        working-directory: ${{ matrix.phase.dir }}
      - run: npm run lint --if-present
        working-directory: ${{ matrix.phase.dir }}
      - run: npm run typecheck --if-present
        working-directory: ${{ matrix.phase.dir }}

  # ---------------- Phase 1: AI-assisted testing ----------------------------
  ai-testing:
    name: Phase 1 · AI Testing (Playwright)
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults: { run: { working-directory: phase-1-ai-testing } }
    env:
      APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: phase-1-ai-testing/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-1-playwright-report
          path: phase-1-ai-testing/playwright-report
          retention-days: 14

  # ---------------- Phase 2: Pact contract testing --------------------------
  contract:
    name: Phase 2 · Contract (Pact)
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 18
    services:
      postgres:
        image: postgres:15.4-alpine
        env:
          POSTGRES_USER:     pact
          POSTGRES_PASSWORD: pact
          POSTGRES_DB:       pact
        options: >-
          --health-cmd "pg_isready -U pact"
          --health-interval 10s --health-timeout 5s --health-retries 5
        ports: ["5432:5432"]
      broker:
        image: pactfoundation/pact-broker:latest
        env:
          PACT_BROKER_DATABASE_HOST:       postgres
          PACT_BROKER_DATABASE_NAME:       pact
          PACT_BROKER_DATABASE_USERNAME:   pact
          PACT_BROKER_DATABASE_PASSWORD:   pact
          PACT_BROKER_BASIC_AUTH_USERNAME: admin
          PACT_BROKER_BASIC_AUTH_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD || 'admin' }}
        ports: ["9292:9292"]
    env:
      PACT_BROKER_BASE_URL: http://localhost:9292
      PACT_BROKER_USERNAME: admin
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD || 'admin' }}
      GITHUB_REF_NAME:      ${{ github.head_ref || github.ref_name }}
      GITHUB_SHA:           ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Wait for broker
        run: |
          for i in {1..30}; do
            curl -sf -u admin:"$PACT_BROKER_PASSWORD" \
              "$PACT_BROKER_BASE_URL/diagnostic/status/heartbeat" >/dev/null && exit 0
            sleep 1
          done
          echo "::error::Broker not healthy"; exit 1
      - name: Consumer — test + publish
        working-directory: phase-2-contract-testing/consumer
        run: |
          npm ci --no-audit --no-fund
          npm test
          npm run publish:pacts
      - name: Provider — verify
        working-directory: phase-2-contract-testing/provider
        env: { CI: "true" }
        run: |
          npm ci --no-audit --no-fund
          npm test

  # ---------------- Phase 3: k6 performance ---------------------------------
  performance:
    name: Phase 3 · Performance (k6)
    needs: [ai-testing, contract]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults: { run: { working-directory: phase-3-performance } }
    env:
      K6_ENV: sandbox
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
        with: { k6-version: "${{ env.K6_VERSION }}" }
      - run: k6 run --compatibility-mode=experimental_enhanced tests/foundations/foundations-test.ts
      - run: |
          mkdir -p reports
          k6 run --compatibility-mode=experimental_enhanced --summary-export=reports/load-summary.json tests/load/load-test.ts
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-3-perf-reports
          path: phase-3-performance/reports
          retention-days: 14

