name: Master Quality Gate

# End-to-end quality gate covering all four phases of the QA Quality Architect
# portfolio. The workflow a recruiter is pointed at — it tells the whole story
# (SAST → AI testing → contract → perf → security → release readiness) in one
# orchestrated, hard-gated run.
#
# Hard gates (any red stage fails the build):
#   1.  bootstrap        — resolve target env, expose to downstream
#   2.  sast             — CodeQL + npm audit + Trivy fs + gitleaks + Hadolint
#   3.  quality          — lint + typecheck across phases (matrix)
#   4.  ai-testing       — Phase 1 Playwright + BDD, browser × shard matrix
#   5.  contract         — Phase 2 Pact consumer-publish → provider-verify → can-i-deploy
#   6.  performance      — Phase 3 k6, Influx-streamed, threshold-gated, run-to-run regression
#   7.  docker-smoke     — build every Dockerfile, smoke-run them
#   8.  security         — Phase 4 OWASP ZAP baseline, SARIF -> Code Scanning
#   9.  sbom             — SPDX + CycloneDX, attached to GHCR image
#   10. summary          — markdown + PR-comment + optional Slack
#
# Design notes (the kind a Principal interviewer asks about):
#   - Hermetic services: Pact Broker + InfluxDB run as service containers per job.
#   - target_env: choose at workflow_dispatch; threaded into every downstream job.
#   - All third-party actions pinned to commit SHAs in production; tags here for
#     reading-clarity (replace with SHAs via dependabot before publishing).
#   - Concurrency: cancel-in-progress on PRs only; main-branch runs never abort.

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_env:
        description: "Environment for the perf gate"
        required: true
        type: choice
        options: [sandbox, dev, staging]
        default: sandbox
      run_zap:
        description: "Run ZAP baseline"
        required: false
        type: boolean
        default: true
      run_soak:
        description: "Run k6 soak (slow — ~30 min)"
        required: false
        type: boolean
        default: false

concurrency:
  group: master-${{ github.ref }}
  # Only cancel in-flight runs on PRs; never abort a push to main mid-deploy.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents:        read
  issues:          write
  pull-requests:   write
  security-events: write
  packages:        write
  id-token:        write   # OIDC for cosign / SBOM attestation

env:
  NODE_VERSION: "20"
  K6_VERSION:   "0.54.0"
  PACT_BROKER_VERSION: "2.119.0.0"

jobs:
  # ============================================================================
  # 1. BOOTSTRAP — resolve dynamic config, expose to all downstream jobs
  # ============================================================================
  bootstrap:
    name: 1 · Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      target_env:    ${{ steps.resolve.outputs.target_env }}
      run_zap:       ${{ steps.resolve.outputs.run_zap }}
      run_soak:      ${{ steps.resolve.outputs.run_soak }}
      is_release:    ${{ steps.resolve.outputs.is_release }}
    steps:
      - id: resolve
        run: |
          ENV="${{ github.event.inputs.target_env || 'sandbox' }}"
          ZAP="${{ github.event.inputs.run_zap || (github.event_name == 'push') }}"
          SOAK="${{ github.event.inputs.run_soak || 'false' }}"
          REL="${{ startsWith(github.ref, 'refs/tags/v') }}"
          {
            echo "target_env=$ENV"
            echo "run_zap=$ZAP"
            echo "run_soak=$SOAK"
            echo "is_release=$REL"
          } >> "$GITHUB_OUTPUT"

  # ============================================================================
  # 2. SAST — Static analysis & secret scanning. Fails closed.
  # ============================================================================
  sast:
    name: 2 · SAST (${{ matrix.tool }})
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: bootstrap
    permissions:
      contents:        read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        tool: [codeql, trivy-fs, gitleaks, hadolint, npm-audit]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ matrix.tool == 'gitleaks' && 0 || 1 }}

      # --- CodeQL: JS/TS deep analysis -----------------------------------------
      - if: matrix.tool == 'codeql'
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality
      - if: matrix.tool == 'codeql'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

      # --- Trivy filesystem scan (catches deps + IaC + Dockerfile config) ------
      - if: matrix.tool == 'trivy-fs'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
      - if: matrix.tool == 'trivy-fs' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # --- gitleaks: blocks committed secrets ----------------------------------
      - if: matrix.tool == 'gitleaks'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # --- Hadolint: every Dockerfile in the repo ------------------------------
      - if: matrix.tool == 'hadolint'
        run: |
          docker run --rm -i hadolint/hadolint:2.12.0-alpine \
            < phase-1-ai-testing/Dockerfile
          docker run --rm -i hadolint/hadolint:2.12.0-alpine \
            < phase-3-performance/Dockerfile

      # --- npm audit: blocks HIGH/CRITICAL deps in every sub-package -----------
      - if: matrix.tool == 'npm-audit'
        run: |
          for pkg in phase-1-ai-testing \
                     phase-2-contract-testing/consumer \
                     phase-2-contract-testing/provider \
                     phase-3-performance; do
            echo "::group::npm audit — $pkg"
            (cd "$pkg" && npm audit --audit-level=high --omit=dev) || exit 1
            echo "::endgroup::"
          done

  # ============================================================================
  # 3. QUALITY — lint + typecheck (fast feedback, fan-out matrix)
  # ============================================================================
  quality:
    name: 3 · Quality / ${{ matrix.phase.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: bootstrap
    strategy:
      fail-fast: false
      matrix:
        phase:
          - { name: phase-1,            dir: phase-1-ai-testing }
          - { name: phase-2-consumer,   dir: phase-2-contract-testing/consumer }
          - { name: phase-2-provider,   dir: phase-2-contract-testing/provider }
          - { name: phase-3,            dir: phase-3-performance }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.phase.dir }}/package-lock.json
      - run: npm ci --no-audit --no-fund
        working-directory: ${{ matrix.phase.dir }}
      - run: npm run lint --if-present
        working-directory: ${{ matrix.phase.dir }}
      - run: npm run typecheck --if-present
        working-directory: ${{ matrix.phase.dir }}
      - run: npm run format:check --if-present
        working-directory: ${{ matrix.phase.dir }}

  # ============================================================================
  # 4. AI-TESTING — Phase 1 Playwright + BDD, browser × shard matrix
  # ============================================================================
  ai-testing:
    name: 4 · AI Testing / ${{ matrix.browser }} / shard ${{ matrix.shard }}/${{ strategy.job-total > 1 && '2' || '1' }}
    needs: [bootstrap, quality, sast]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        shard:   [1, 2]
    defaults:
      run:
        working-directory: phase-1-ai-testing
    env:
      APPLITOOLS_API_KEY:    ${{ secrets.APPLITOOLS_API_KEY }}
      APPLITOOLS_BATCH_ID:   ${{ github.run_id }}
      APPLITOOLS_BATCH_NAME: "master-${{ github.ref_name }}"
      # Branch-aware baseline: PR baselines diff against main, not against
      # whatever HEAD happened to push last. This is the visual-regression
      # branching strategy the audit flagged as missing.
      APPLITOOLS_BRANCH:        ${{ github.head_ref || github.ref_name }}
      APPLITOOLS_PARENT_BRANCH: main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: phase-1-ai-testing/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run BDD + API + a11y suites (sharded)
        run: |
          npx bddgen
          npx playwright test \
            --project="bdd:${{ matrix.browser }}" \
            --grep-invert @flaky \
            --shard=${{ matrix.shard }}/2
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-1-pw-${{ matrix.browser }}-shard${{ matrix.shard }}
          path: phase-1-ai-testing/playwright-report
          retention-days: 14
      - name: Upload trace zips (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phase-1-traces-${{ matrix.browser }}-shard${{ matrix.shard }}
          path: phase-1-ai-testing/test-results/**/trace.zip
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================================
  # 5. CONTRACT — Phase 2 Pact, ephemeral broker via service containers
  # ============================================================================
  contract:
    name: 5 · Contract Tests
    needs: [bootstrap, quality, sast]
    runs-on: ubuntu-latest
    timeout-minutes: 18
    services:
      postgres:
        image: postgres:15.4-alpine
        env:
          POSTGRES_USER:     pact
          POSTGRES_PASSWORD: pact
          POSTGRES_DB:       pact
        options: >-
          --health-cmd "pg_isready -U pact"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      broker:
        image: pactfoundation/pact-broker:latest
        env:
          PACT_BROKER_DATABASE_HOST:       postgres
          PACT_BROKER_DATABASE_NAME:       pact
          PACT_BROKER_DATABASE_USERNAME:   pact
          PACT_BROKER_DATABASE_PASSWORD:   pact
          PACT_BROKER_BASIC_AUTH_USERNAME: admin
          PACT_BROKER_BASIC_AUTH_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
        ports: ["9292:9292"]
    env:
      PACT_BROKER_BASE_URL: http://localhost:9292
      PACT_BROKER_USERNAME: admin
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
      GIT_BRANCH:           ${{ github.head_ref || github.ref_name }}
      GIT_COMMIT:           ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Guard — broker password must be set
        run: |
          if [ -z "${PACT_BROKER_PASSWORD:-}" ]; then
            echo "::error::PACT_BROKER_PASSWORD secret is missing — refusing to run with default credentials."
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install consumer + provider deps
        run: |
          (cd phase-2-contract-testing/consumer && npm ci --no-audit --no-fund)
          (cd phase-2-contract-testing/provider && npm ci --no-audit --no-fund)
      - name: Wait for broker
        run: |
          for i in {1..30}; do
            if curl -sf -u admin:"$PACT_BROKER_PASSWORD" \
                 "$PACT_BROKER_BASE_URL/diagnostic/status/heartbeat" >/dev/null; then
              echo "Broker up after ${i}s" && exit 0
            fi
            sleep 1
          done
          echo "::error::Broker did not become healthy in 30s" && exit 1
      - name: Consumer pact tests + publish
        working-directory: phase-2-contract-testing/consumer
        run: |
          npm test
          npm run pact:publish
      - name: Provider verification
        working-directory: phase-2-contract-testing/provider
        run: npm run pact:verify
      - name: can-i-deploy gate (HARD GATE — no `|| true`)
        working-directory: phase-2-contract-testing
        run: |
          npx --yes @pact-foundation/pact-cli@latest can-i-deploy \
            --pacticipant order-service \
            --version "$GIT_COMMIT" \
            --to-environment "${{ needs.bootstrap.outputs.target_env }}" \
            --provider-version-branch main \
            --broker-base-url "$PACT_BROKER_BASE_URL" \
            --broker-username "$PACT_BROKER_USERNAME" \
            --broker-password "$PACT_BROKER_PASSWORD"
      - name: Record deployment (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: phase-2-contract-testing
        run: |
          npx --yes @pact-foundation/pact-cli@latest record-deployment \
            --pacticipant order-service \
            --version "$GIT_COMMIT" \
            --environment "${{ needs.bootstrap.outputs.target_env }}" \
            --broker-base-url "$PACT_BROKER_BASE_URL" \
            --broker-username "$PACT_BROKER_USERNAME" \
            --broker-password "$PACT_BROKER_PASSWORD"

  # ============================================================================
  # 6. PERFORMANCE — k6, Influx-streamed, threshold-gated, regression-aware
  # ============================================================================
  performance:
    name: 6 · Performance (k6 / ${{ needs.bootstrap.outputs.target_env }})
    needs: [bootstrap, ai-testing, contract]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      influxdb:
        image: influxdb:1.8.10-alpine
        env:
          INFLUXDB_DB: k6
          INFLUXDB_HTTP_AUTH_ENABLED: "true"
          INFLUXDB_ADMIN_USER:     k6admin
          INFLUXDB_ADMIN_PASSWORD: ${{ secrets.INFLUX_ADMIN_PASSWORD }}
          INFLUXDB_USER:           k6writer
          INFLUXDB_USER_PASSWORD:  ${{ secrets.INFLUX_USER_PASSWORD }}
        ports: ["8086:8086"]
        options: >-
          --health-cmd "curl -sf http://localhost:8086/ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 6
    defaults:
      run:
        working-directory: phase-3-performance
    env:
      K6_ENV:    ${{ needs.bootstrap.outputs.target_env }}
      K6_OUT:    "influxdb=http://k6writer:${{ secrets.INFLUX_USER_PASSWORD }}@localhost:8086/k6"
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
        with:
          k6-version: ${{ env.K6_VERSION }}
      - name: Foundations smoke
        run: k6 run --out "$K6_OUT" tests/foundations/foundations-test.ts
      - name: Load test (threshold-gated)
        run: |
          mkdir -p reports
          k6 run \
            --out "$K6_OUT" \
            --summary-export=reports/load-summary.json \
            tests/load/load-test.ts
      - name: Soak test (slow — only when requested)
        if: needs.bootstrap.outputs.run_soak == 'true'
        run: k6 run --out "$K6_OUT" tests/soak/soak-test.ts
      - name: Run-to-run regression check
        run: node scripts/perf-regression.js reports/load-summary.json
        continue-on-error: ${{ github.event_name == 'pull_request' }}
      - name: Upload perf reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-3-perf-reports
          path: phase-3-performance/reports
          retention-days: 30

  # ============================================================================
  # 7. DOCKER-SMOKE — every Dockerfile must build AND run
  # ============================================================================
  docker-smoke:
    name: 7 · Docker build + smoke / ${{ matrix.image.name }}
    needs: [bootstrap, sast]
    runs-on: ubuntu-latest
    timeout-minutes: 18
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: phase-1-playwright, context: phase-1-ai-testing,  smoke: "node -e \"require('@playwright/test')\"" }
          - { name: phase-3-k6,         context: phase-3-performance, smoke: "version" }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          load: true
          tags: ${{ matrix.image.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to:   type=gha,scope=${{ matrix.image.name }},mode=max
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image.name }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-img-${{ matrix.image.name }}.sarif
      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-img-${{ matrix.image.name }}.sarif
          category: trivy-image-${{ matrix.image.name }}
      - name: Smoke run
        run: docker run --rm ${{ matrix.image.name }}:${{ github.sha }} ${{ matrix.image.smoke }}

  # ============================================================================
  # 8. SECURITY — Phase 4 OWASP ZAP baseline (reusable workflow)
  # ============================================================================
  security:
    name: 8 · Security (OWASP ZAP)
    needs: [bootstrap, performance]
    if: needs.bootstrap.outputs.run_zap == 'true'
    uses: ./.github/workflows/zap-baseline.yml
    with:
      target_url:       https://jsonplaceholder.typicode.com
      gate_on_warnings: false

  # ============================================================================
  # 9. SBOM — generate + attest. Tag-only.
  # ============================================================================
  sbom:
    name: 9 · SBOM
    needs: [bootstrap, docker-smoke]
    if: needs.bootstrap.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents:  read
      packages:  write
      id-token:  write
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cdx.json
          retention-days: 90

  # ============================================================================
  # 10. SUMMARY — markdown step-summary + PR comment + Slack (if configured)
  # ============================================================================
  summary:
    name: 10 · Summary
    needs:
      [bootstrap, sast, quality, ai-testing, contract,
       performance, docker-smoke, security]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents:      read
      pull-requests: write
    steps:
      - name: Compose status table
        id: status
        run: |
          {
            echo "## Master Quality Gate — ${{ github.sha }}"
            echo ""
            echo "**Target env:** \`${{ needs.bootstrap.outputs.target_env }}\`  •  **Run ZAP:** \`${{ needs.bootstrap.outputs.run_zap }}\`  •  **Run soak:** \`${{ needs.bootstrap.outputs.run_soak }}\`"
            echo ""
            echo "| Stage | Result |"
            echo "|---|---|"
            echo "| 2 · SAST          | ${{ needs.sast.result }}        |"
            echo "| 3 · Quality       | ${{ needs.quality.result }}     |"
            echo "| 4 · AI Testing    | ${{ needs.ai-testing.result }}  |"
            echo "| 5 · Contract      | ${{ needs.contract.result }}    |"
            echo "| 6 · Performance   | ${{ needs.performance.result }} |"
            echo "| 7 · Docker smoke  | ${{ needs.docker-smoke.result }}|"
            echo "| 8 · Security      | ${{ needs.security.result }}    |"
          } | tee summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Post / update PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: master-quality-gate
          path:   summary.md
      - name: Notify Slack on red main
        if: |
          failure() &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🚨 Master Quality Gate red on main: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK_URL"
